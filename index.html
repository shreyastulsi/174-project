<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS174A Kart Prototype</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
      #hud {
        position: fixed;
        left: 12px;
        top: 12px;
        color: white;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 14px;
        user-select: none;
        background: rgba(0,0,0,0.35);
        padding: 10px 12px;
        border-radius: 10px;
        line-height: 1.35;
      }
      #hint { opacity: 0.8; font-size: 12px; }
      #countdown {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 120px;
        font-weight: bold;
        text-shadow: 0 0 30px rgba(255,255,255,0.5);
        user-select: none;
        pointer-events: none;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div><b>Controls</b></div>
      <div>W/S: throttle / brake</div>
      <div>A/D: steer</div>
      <div>Mouse drag: orbit camera</div>
      <div id="hint">Tip: click and drag to look around</div>
      <div style="margin-top:8px;">
        <span>Speed:</span> <span id="speed">0.0</span>
      </div>
    </div>
    <div id="countdown"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
